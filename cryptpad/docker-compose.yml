services:
  cryptpad:
    image: cryptpad/cryptpad:${CRYPTPAD_TAG:-latest}
    container_name: cryptpad
    network_mode: service:netbird
    depends_on:
      netbird:
        condition: service_started
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      - CPAD_MAIN_DOMAIN=https://cloud.server.netbird.cloud
      - CPAD_SANDBOX_DOMAIN=https://sandbox.server.netbird.cloud
      - CPAD_CONF=/cryptpad/config/config.js
      - NODE_EXTRA_CA_CERTS=/etc/ssl/cert.pem
    volumes:
      - /mnt/media/cryptpad/blob:/cryptpad/blob:Z
      - /mnt/media/cryptpad/block:/cryptpad/block:Z
      - /mnt/media/cryptpad/data:/cryptpad/data:Z
      - /mnt/media/cryptpad/files:/cryptpad/datastore:Z
      - /srv/docker/data/cryptpad/customize:/cryptpad/customize:Z
      - /srv/docker/data/cryptpad/config:/cryptpad/config:ro,Z
      - ./sso:/cryptpad/lib/plugins/sso:ro,Z
      # Mount Caddy's root CA at the correct path for cryptpad's base distro
      - /etc/pki/tls/certs/ca-bundle.crt:/etc/ssl/cert.pem:ro,z
    labels:
      glance.name: CryptPad
      glance.icon: /assets/cryptpad.png
      glance.url: https://cloud.server.netbird.cloud
      glance.description: Encrypted Office Suite
      glance.id: cryptpad
      glance.category: user-facing
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000

  netbird:
    image: netbirdio/netbird:latest
    container_name: cryptpad-nb
    hostname: cloud
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
    cap_drop:
      - ALL
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY}
      - NB_ENABLE_ROSENPASS=true
    volumes:
      - netbird-state:/var/lib/netbird:z
    ports:
      - "127.0.0.1:3002:3000"
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.parent: cryptpad
      glance.name: Netbird

volumes:
  netbird-state:
