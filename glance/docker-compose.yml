services:
  glance:
    image: glanceapp/glance
    container_name: glance
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /srv/docker/data/glance/config:/app/config:ro,Z
      - /srv/docker/data/glance/assets:/app/assets:ro,Z
      - /etc/timezone:/etc/timezone:ro,Z
      - /etc/localtime:/etc/localtime:ro,Z
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
    labels:
      glance.name: Glance
      glance.icon: dashboard
      glance.url: http://home:8080
      glance.description: Dashboard with feeds
      glance.id: glance

  tailscale:
    image: tailscale/tailscale:latest
    container_name: glance-ts
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--accept-dns
    hostname: home
    volumes:
      - tailscale_state:/var/lib/tailscale:z
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      glance.parent: glance
      glance.name: Tailscale

networks:
  default:
    name: glance_default
    external: true

volumes:
  tailscale_state:
