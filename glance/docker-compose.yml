services:
  glance:
    image: glanceapp/glance
    container_name: glance
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config:/app/config:ro,Z
      - ./assets:/app/assets:ro,Z
      - /etc/timezone:/etc/timezone:ro,Z
      - /etc/localtime:/etc/localtime:ro,Z
    labels:
      glance.name: Glance
      glance.icon: dashboard
      glance.url: http://home:8080
      glance.description: Dashboard with feeds
      glance.id: glance

  tailscale:
    image: tailscale/tailscale:latest
    container_name: glance-ts
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--accept-dns
    hostname: home
    volumes:
      - glance_tailscale_state:/var/lib/tailscale:z
    devices:
      - /dev/net/tun:/dev/net/tun

networks:
  default:
    name: glance_default
    external: true

volumes:
  glance_tailscale_state:
