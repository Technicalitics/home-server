services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    volumes:
      - /srv/docker/data/owntracks/mosquitto/config:/mosquitto/config:Z
      - /srv/docker/data/owntracks/mosquitto/data:/mosquitto/data:Z
      - /srv/docker/data/owntracks/mosquitto/log:/mosquitto/log:Z
    labels:
      glance.name: MQTT
      glance.parent: owntracks

  frontend:
    image: owntracks/frontend
    container_name: owntracks-frontend
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    environment:
      - SERVER_HOST=127.0.0.1
      - SERVER_PORT=8083
    labels:
      glance.name: OwnTracks
      glance.icon: /assets/owntracks.png
      glance.url: https://tracks.${TAILNET_NAME}.ts.net
      glance.description: Location Sharing
      glance.id: owntracks
      glance.category: user-facing

  recorder:
    image: owntracks/recorder:latest
    container_name: owntracks-recorder
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
      mqtt:
        condition: service_started
    env_file:
      - .env
    environment:
      - OTR_HOST=127.0.0.1
      - OTR_PORT=1883
      - OTR_TOPIC=owntracks/#
      - TZ=UTC
    volumes:
      - /srv/docker/data/owntracks/recorder/config:/config:Z
      - /srv/docker/data/owntracks/recorder/store:/store:Z
    labels:
      glance.name: Recorder
      glance.parent: owntracks

  tailscale:
    image: dhi.io/tailscale:1
    container_name: owntracks-ts
    restart: unless-stopped
    command:
      - /usr/local/bin/containerboot
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
      - TS_SERVE_CONFIG=/config/serve.json
    hostname: tracks
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale_state:/var/lib/tailscale:z
      - ./serve.json:/config/serve.json:ro,Z
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.name: Tailscale
      glance.parent: owntracks

volumes:
  tailscale_state:
