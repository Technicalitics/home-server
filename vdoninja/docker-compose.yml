services:
  vdo-ninja:
    image: umlatt/vdo.ninja:latest
    container_name: vdo.ninja
    restart: unless-stopped
    ports:
      - "127.0.0.1:8084:80"
    env_file:
      - .env
    command:
      - /init/entrypoint.sh
    entrypoint:
      - /docker-entrypoint.sh
    volumes:
      - vdoninja_data:/var/www/html:z
    labels:
      glance.name: VDO.Ninja
      glance.icon: /assets/vdoninja.png
      glance.url: https://vdo.server.netbird.cloud
      glance.description: Peer-to-peer video streaming
      glance.id: vdoninja
      glance.category: user-facing
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    working_dir: /var/www/html
    stdin_open: true
    tty: true

volumes:
  vdoninja_data:
