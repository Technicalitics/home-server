services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    environment:
      - TZ=${TZ:-UTC}
    restart: unless-stopped
    volumes:
      - /srv/docker/data/jellyfin/config:/config:z
      - /srv/docker/data/jellyfin/cache:/cache:z
      - /mnt/media/movies:/media/movies:ro,z
      - /mnt/media/music:/media/music:ro,z
    labels:
      glance.name: Jellyfin
      glance.icon: /assets/jellyfin.png
      glance.url: https://media.${TAILNET_NAME}.ts.net
      glance.description: Media server
      glance.id: jellyfin
      glance.category: user-facing

  tailscale:
    image: dhi.io/tailscale:1
    container_name: jellyfin-ts
    restart: unless-stopped
    command:
      - /usr/local/bin/containerboot
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
      - TS_SERVE_CONFIG=/config/serve.json
    hostname: media
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale:z
      - ./serve.json:/config/serve.json:ro,Z
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.parent: jellyfin
      glance.name: Tailscale

volumes:
  tailscale-state:
