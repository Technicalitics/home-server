services:
  database:
    image: mysql:8.0
    container_name: linguacafe-database
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICE_NAME=linguacafe
    volumes:
      - /srv/docker/data/linguacafe/database:/var/lib/mysql:Z
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      glance.name: Database
      glance.parent: linguacafe

  python:
    image: ghcr.io/simjanos-dev/linguacafe-python-service:latest
    container_name: linguacafe-python
    restart: unless-stopped
    environment:
      - PYTHONPATH=/var/www/html/storage/app/model
    volumes:
      - /srv/docker/data/linguacafe/storage:/var/www/html/storage:Z
    command:
    - python3
    - /app/tokenizer.py
    user: "laravel"
    labels:
      glance.name: Python
      glance.parent: linguacafe

  redis:
    image: redis:7.2-alpine
    container_name: linguacafe-redis
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /srv/docker/data/linguacafe/cache:/data:Z
    labels:
      glance.name: Redis
      glance.parent: linguacafe

  webserver:
    image: ghcr.io/simjanos-dev/linguacafe-webserver:latest
    container_name: linguacafe-webserver
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=database
      - DB_PORT=3306
    volumes:
      - /srv/docker/data/linguacafe/docker/supervisor-horizon.conf:/etc/supervisor/conf.d/horizon.conf:Z
      - /srv/docker/data/linguacafe/docker/supervisor-websockets.conf:/etc/supervisor/conf.d/websockets.conf:Z
      - /srv/docker/data/linguacafe/storage:/var/www/html/storage:Z
    depends_on:
      database:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway
    user: "laravel"
    labels:
      glance.name: LinguaCafe
      glance.icon: /assets/linguacafe.png
      glance.url: https://cafe.${TAILNET_NAME}.ts.net
      glance.description: Learn Languages Through Reading
      glance.id: linguacafe
      glance.category: user-facing

  tailscale:
    image: tailscale/tailscale:latest
    container_name: linguacafe-ts
    restart: unless-stopped
    command:
      - /usr/local/bin/containerboot
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
    hostname: cafe
    volumes:
      - tailscale_state:/var/lib/tailscale:z
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      glance.name: Tailscale
      glance.parent: linguacafe

volumes:
  tailscale_state:
