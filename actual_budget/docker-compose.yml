services:
  server:
    image: actualbudget/actual-server:latest
    container_name: actual_server
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    volumes:
      - /srv/docker/data/actual_budget/actual-data:/data:Z
    labels:
      glance.name: Actual Budget
      glance.icon: /assets/actual-budget.png
      glance.url: https://budget.${TAILNET_NAME}.ts.net
      glance.description: Budgeting
      glance.id: actual-budget
      glance.category: user-facing

  tailscale:
    image: dhi.io/tailscale:1
    container_name: actual-budget-ts
    restart: unless-stopped
    command:
      - /usr/local/bin/containerboot
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
      - TS_SERVE_CONFIG=/config/serve.json
    hostname: budget
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale_state:/var/lib/tailscale:z
      - ./serve.json:/config/serve.json:ro,Z
    labels:
      glance.name: Tailscale
      glance.parent: actual-budget
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  tailscale_state:
