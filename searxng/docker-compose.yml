services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SEARXNG_BASE_URL=https://search.${TAILNET_NAME}.ts.net/
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
    volumes:
      - /srv/docker/data/searxng/settings.yml:/etc/searxng/settings.yml:ro,z
      - searxng_data:/var/cache/searxng:z
    labels:
      glance.name: SearXNG
      glance.icon: /assets/searxng.png
      glance.url: https://search.${TAILNET_NAME}.ts.net
      glance.description: Private Metasearch Engine
      glance.id: searxng
      glance.category: user-facing
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    entrypoint:
      - /usr/local/searxng/entrypoint.sh

  tailscale:
    image: tailscale/tailscale:latest
    command:
      - /usr/local/bin/containerboot
    container_name: searxng-ts
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
    hostname: search
    volumes:
      - tailscale_state:/var/lib/tailscale:z
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      glance.name: Tailscale
      glance.parent: searxng

volumes:
  searxng_data:
  tailscale_state:
