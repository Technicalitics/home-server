services:
  searxng:
    image: oaklight/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    env_file:
      - .env
    environment:
      - SEARXNG_BASE_URL=https://search.server.netbird.cloud/
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
    volumes:
      - /srv/docker/data/searxng/settings.yml:/etc/searxng/settings.yml:ro,z
      - searxng_data:/var/cache/searxng:z
    labels:
      glance.name: SearXNG
      glance.icon: /assets/searxng.png
      glance.url: https://search.server.netbird.cloud
      glance.description: Private Metasearch Engine
      glance.id: searxng
      glance.category: user-facing
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    entrypoint:
      - /usr/local/searxng/entrypoint.sh

volumes:
  searxng_data:
