services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    network_mode: service:tailscale
    depends_on:
      redis:
        condition: service_started
      database:
        condition: service_started
      tailscale:
        condition: service_started
    volumes:
      - ${UPLOAD_LOCATION}:/data:z
      - /etc/localtime:/etc/localtime:ro,z
    env_file:
      - .env
    restart: always
    labels:
      glance.name: Immich
      glance.icon: /assets/immich.png
      glance.url: https://images.${TAILNET_NAME}.ts.net
      glance.description: Image & video management
      glance.id: immich
      glance.category: user-facing

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    labels:
      glance.parent: immich
      glance.name: Machine Learning

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:2bce660b767cb62c8c0ea020e94a230093be63dbd6af4f21b044960517a5842d
    network_mode: service:tailscale
    env_file:
      - .env
    restart: always
    depends_on:
      tailscale:
        condition: service_started
    labels:
      glance.parent: immich
      glance.name: Redis

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    network_mode: service:tailscale
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data:z
    shm_size: 128mb
    restart: always
    labels:
      glance.parent: immich
      glance.name: DB

  tailscale:
    image: dhi.io/tailscale:1
    container_name: immich-ts
    restart: always
    command:
      - /usr/local/bin/containerboot
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
      - TS_SERVE_CONFIG=/config/serve.json
    hostname: images
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - immich_tailscale-state:/var/lib/tailscale:z
      - /srv/docker/data/immich/serve/serve.json:/config/serve.json:ro,Z
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.parent: immich
      glance.name: Tailscale

volumes:
  model-cache:
  immich_tailscale-state:
