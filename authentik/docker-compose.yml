services:
  postgresql:
    image: dhi.io/postgres:16-alpine3.23
    container_name: authentik_postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${PG_DB:-authentik}
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_USER=${PG_USER:-authentik}
      - PGDATA=/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - /srv/docker/data/authentik/_data:/var/lib/postgresql/data:z
    networks:
      - authentik_net
    labels:
      glance.parent: authentik
      glance.name: DB

  server:
    command: server
    container_name: authentik_server
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2}
    ports:
      - "127.0.0.1:9000:9000"
    env_file:
      - .env
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    user: "1000"
    volumes:
      - /srv/docker/data/authentik/custom-templates:/templates:z
      - /srv/docker/data/authentik/data:/data:z
    networks:
      - authentik_net
    labels:
      glance.name: Authentik
      glance.icon: /assets/authentik.png
      glance.url: https://auth.server.netbird.cloud
      glance.description: Identity provider and SSO
      glance.id: authentik

  worker:
    command: worker
    container_name: authentik_worker
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.2}
    env_file:
      - .env
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    shm_size: 512mb
    user: "root"
    volumes:
      - /srv/docker/data/authentik/certs:/certs:Z
      - /srv/docker/data/authentik/custom-templates:/templates:z
      - /srv/docker/data/authentik/data:/data:z
      - /var/run/docker.sock:/var/run/docker.sock:z
    networks:
      - authentik_net
    labels:
      glance.parent: authentik
      glance.name: Worker

networks:
  authentik_net:
    driver: bridge
