services:
  db:
    image: dhi.io/postgres:17-alpine3.22
    container_name: pinepods-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - /mnt/media/podcasts/pinepods/pgdata:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pinepods_database"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pinepods_net
    labels:
      glance.name: Database
      glance.parent: pinepods

  valkey:
    image: dhi.io/valkey:9
    container_name: pinepods-valkey
    restart: unless-stopped
    volumes:
      - /mnt/media/podcasts/pinepods/valkey:/data:Z
    networks:
      - pinepods_net
    labels:
      glance.name: Valkey
      glance.parent: pinepods

  pinepods:
    image: madeofpendletonwool/pinepods:latest
    container_name: pinepods
    restart: unless-stopped
    ports:
      - "127.0.0.1:8040:8040"
    env_file:
      - .env
    environment:
      - DEBUG_MODE=false
      - DB_HOST=db
      - VALKEY_HOST=valkey
      - TZ=America/New_York
      - DB_PORT=5432
      - DB_TYPE=postgresql
      - PEOPLE_API_URL=https://people.pinepods.online
      - SEARCH_API_URL=https://search.pinepods.online/api/search
      - PUID=911
      - PGID=911
      - APP_ROOT=/pinepods
    volumes:
      - /mnt/media/podcasts/pinepods/backups:/opt/pinepods/backups:Z
      - /mnt/media/podcasts/pinepods/downloads:/opt/pinepods/downloads:Z
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pinepods_net
    labels:
      glance.name: PinePods
      glance.icon: /assets/pinepods.png
      glance.url: https://podcasts.server.netbird.cloud
      glance.description: Complete Podcast Ecosystem
      glance.id: pinepods
      glance.category: user-facing

networks:
  pinepods_net:
    driver: bridge
