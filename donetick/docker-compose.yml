services:
  donetick:
    image: donetick/donetick
    container_name: donetick
    network_mode: service:netbird
    depends_on:
      netbird:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    init: true
    volumes:
      - /srv/docker/data/donetick/data:/donetick-data:z
      - /srv/docker/data/donetick/config:/config:z
    environment:
      - DT_ENV=selfhosted
      - DT_SQLITE_PATH=/donetick-data/donetick.db
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://127.0.0.1:2021 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      glance.name: Donetick
      glance.icon: /assets/donetick.png
      glance.url: https://tasks.server.netbird.cloud
      glance.description: Task management
      glance.id: donetick
      glance.category: user-facing

  netbird:
    image: netbirdio/netbird:latest
    container_name: donetick-nb
    hostname: tasks
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
    cap_drop:
      - ALL
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY}
      - NB_ENABLE_ROSENPASS=true
    volumes:
      - netbird-state:/var/lib/netbird:z
    ports:
      - "127.0.0.1:2021:2021"
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.parent: donetick
      glance.name: Netbird

volumes:
  netbird-state:
