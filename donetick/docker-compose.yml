services:
  donetick:
    image: donetick/donetick
    container_name: donetick
    env_file:
      - .env
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    volumes:
      - /srv/docker/data/donetick/data:/donetick-data:z
      - /srv/docker/data/donetick/config:/config:z
    environment:
      - DT_ENV=selfhosted
      - DT_SQLITE_PATH=/donetick-data/donetick.db
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://127.0.0.1:2021 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      glance.name: Donetick
      glance.icon: /assets/donetick.png
      glance.url: https://tasks.${TAILNET_NAME}.ts.net
      glance.description: Task management
      glance.id: donetick
      glance.category: user-facing

  tailscale:
    image: dhi.io/tailscale:1
    container_name: donetick-ts
    restart: unless-stopped
    command:
      - /usr/local/bin/containerboot
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
      - TS_SERVE_CONFIG=/config/serve.json
    hostname: tasks
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-state:/var/lib/tailscale:z
      - ./serve.json:/config/serve.json:ro,Z
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.parent: donetick
      glance.name: Tailscale

volumes:
  tailscale-state:
