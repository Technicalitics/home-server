services:
  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: media-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - media_network
    environment:
      - FIREWALL_INPUT_PORTS=8080
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.0
    container_name: media-qbittorrent
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_started
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    volumes:
      - /srv/docker/data/qbittorrent:/config:z
      - /mnt/media/downloads:/downloads:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: media-sonarr
    restart: unless-stopped
    networks:
      - media_network
    ports:
      - "127.0.0.1:8989:8989"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/sonarr:/config:z
      - /mnt/media/tv:/tv:z
      - /mnt/media/downloads:/downloads:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    container_name: media-radarr
    restart: unless-stopped
    networks:
      - media_network
    ports:
      - "127.0.0.1:7878:7878"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/radarr:/config:z
      - /mnt/media/movies:/movies:z
      - /mnt/media/downloads:/downloads:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: media-flaresolverr
    restart: unless-stopped
    networks:
      - media_network
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-UTC}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5
    container_name: media-prowlarr
    restart: unless-stopped
    networks:
      - media_network
    ports:
      - "127.0.0.1:9696:9696"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/prowlarr:/config:z
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  seerr:
    image: seerr/seerr:v3
    container_name: media-seerr
    restart: unless-stopped
    init: true
    networks:
      - media_network
    ports:
      - "127.0.0.1:5055:5055"
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/seerr:/app/config:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:3
    container_name: media-maintainerr
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    networks:
      - media_network
    ports:
      - "127.0.0.1:6246:6246"
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/maintainerr:/opt/data:z
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  media-ts:
    image: dhi.io/tailscale:1
    container_name: media-ts
    restart: unless-stopped
    command:
      - /usr/local/bin/containerboot
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
      - TS_SERVE_CONFIG=/config/serve.json
    hostname: requests
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - media_tailscale_state:/var/lib/tailscale:z
      - ./serve.json:/config/serve.json:ro,Z
    networks:
      - media_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

networks:
  media_network:
    name: media_network
    driver: bridge

volumes:
  media_tailscale_state:
