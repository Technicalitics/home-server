services:
  gluetun:
    image: qmcgaw/gluetun:v3
    container_name: media-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - media_network
    environment:
      - FIREWALL_INPUT_PORTS=8080
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    labels:
      glance.parent: qbittorrent
      glance.name: gluetun

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.0
    container_name: media-qbittorrent
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_started
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
    volumes:
      - /srv/docker/data/qbittorrent:/config:z
      - /mnt/media/downloads:/downloads:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    labels:
      glance.name: QBitTorrent
      glance.icon: /assets/qbittorrent.png
      glance.description: Torrent Client
      glance.id: qbittorrent

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: media-sonarr
    restart: unless-stopped
    networks:
      - media_network
    ports:
      - "127.0.0.1:8989:8989"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/sonarr:/config:z
      - /mnt/media/tv:/tv:z
      - /mnt/media/downloads:/downloads:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    labels:
      glance.name: Sonarr
      glance.icon: /assets/sonarr.png
      glance.description: TV Manager for Torrents
      glance.id: sonarr

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    container_name: media-radarr
    restart: unless-stopped
    networks:
      - media_network
    ports:
      - "127.0.0.1:7878:7878"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/radarr:/config:z
      - /mnt/media/movies:/movies:z
      - /mnt/media/downloads:/downloads:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    labels:
      glance.name: Radarr
      glance.icon: /assets/radarr.png
      glance.description: Movie Manager for Torrents
      glance.id: radarr

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: media-flaresolverr
    restart: unless-stopped
    networks:
      - media_network
    environment:
      - LOG_LEVEL=info
      - CAPTCHA_SOLVER=none
      - TZ=${TZ:-UTC}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    labels:
      glance.name: Flaresolverr
      glance.icon: /assets/flaresolverr.png
      glance.description: Fix issues with Cloudflare
      glance.id: flaresolverr

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5
    container_name: media-prowlarr
    restart: unless-stopped
    networks:
      - media_network
    ports:
      - "127.0.0.1:9696:9696"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - /srv/docker/data/prowlarr:/config:z
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    labels:
      glance.name: Prowlarr
      glance.icon: /assets/prowlarr.png
      glance.description: Indexer Management
      glance.id: prowlarr

  seerr:
    image: seerr/seerr:v3
    container_name: media-seerr
    network_mode: service:netbird
    depends_on:
      netbird:
        condition: service_started
    restart: unless-stopped
    init: true
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - NODE_EXTRA_CA_CERTS=/etc/ssl/cert.pem
    volumes:
      - /srv/docker/data/seerr:/app/config:z
      - /etc/pki/tls/certs/ca-bundle.crt:/etc/ssl/cert.pem:ro,z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    labels:
      glance.name: Seerr
      glance.icon: /assets/seerr.png
      glance.url: https://requests.server.netbird.cloud
      glance.description: Media Discovery for Jellyfin
      glance.id: seer

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:3
    container_name: media-maintainerr
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    networks:
      - media_network
    ports:
      - "127.0.0.1:6246:6246"
    environment:
      - TZ=${TZ:-UTC}
      - NODE_EXTRA_CA_CERTS=/etc/ssl/cert.pem
    volumes:
      - /srv/docker/data/maintainerr:/opt/data:z
      - /etc/pki/tls/certs/ca-bundle.crt:/etc/ssl/cert.pem:ro,z
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    labels:
      glance.name: Maintainerr
      glance.icon: /assets/maintainerr.png
      glance.description: Automated Media Library Manager
      glance.id: maintainerr

  netbird:
    image: netbirdio/netbird:latest
    container_name: media-seerr-nb
    hostname: requests
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
    cap_drop:
      - ALL
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY}
      - NB_ENABLE_ROSENPASS=true
    volumes:
      - netbird-state:/var/lib/netbird:z
    ports:
      - "127.0.0.1:5055:5055"
    networks:
      - media_network
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      glance.parent: seerr
      glance.name: Netbird

networks:
  media_network:
    name: media_network
    driver: bridge

volumes:
  netbird-state:
