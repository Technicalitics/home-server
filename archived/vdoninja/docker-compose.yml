services:
  vdo-ninja:
    image: umlatt/vdo.ninja:latest
    container_name: vdo.ninja
    restart: unless-stopped
    env_file:
      - .env
    command:
      - /init/entrypoint.sh
    entrypoint:
      - /docker-entrypoint.sh
    volumes:
      - vdoninja_data:/var/www/html:z
    labels:
      glance.name: VDO.Ninja
      glance.icon: /assets/vdo.png
      glance.url: https://vdo.${TAILNET_NAME}.ts.net
      glance.description: Peer-to-peer video streaming
      glance.id: vdoninja
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      tailscale:
        condition: service_started
    working_dir: /var/www/html
    stdin_open: true
    tty: true

  tailscale:
    image: tailscale/tailscale:latest
    command:
      - /usr/local/bin/containerboot
    container_name: vdoninja-ts
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
    hostname: vdo
    volumes:
      - tailscale_state:/var/lib/tailscale:z
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      glance.name: Tailscale
      glance.parent: vdoninja

volumes:
  vdoninja_data:
  tailscale_state:
