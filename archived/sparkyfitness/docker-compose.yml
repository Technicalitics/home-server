services:
  sparkyfitness-db:
    image: postgres:15-alpine
    restart: unless-stopped
    container_name: sparkyfitness-db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${SPARKY_FITNESS_DB_NAME}
      - POSTGRES_USER=${SPARKY_FITNESS_DB_USER}
      - POSTGRES_PASSWORD=${SPARKY_FITNESS_DB_PASSWORD}
    volumes:
      - /srv/docker/data/sparkyfitness/postgresql:/var/lib/postgresql/data:z
    networks:
      - sparkyfitness-network
    labels:
      glance.parent: sparkyfitness
      glance.name: Database

  sparkyfitness-server:
    image: codewithcj/sparkyfitness_server:latest
    restart: unless-stopped
    container_name: sparkyfitness-server
    env_file:
      - .env
    environment:
      - SPARKY_FITNESS_LOG_LEVEL=ERROR
      - ALLOW_PRIVATE_NETWORK_CORS=false
      - SPARKY_FITNESS_DB_USER=${SPARKY_FITNESS_DB_USER}
      - SPARKY_FITNESS_DB_HOST=sparkyfitness-db
      - SPARKY_FITNESS_DB_NAME=${SPARKY_FITNESS_DB_NAME}
      - SPARKY_FITNESS_DB_PASSWORD=${SPARKY_FITNESS_DB_PASSWORD}
      - SPARKY_FITNESS_APP_DB_USER=${SPARKY_FITNESS_APP_DB_USER}
      - SPARKY_FITNESS_APP_DB_PASSWORD=${SPARKY_FITNESS_APP_DB_PASSWORD}
      - SPARKY_FITNESS_DB_PORT=5432
      - SPARKY_FITNESS_API_ENCRYPTION_KEY=${SPARKY_FITNESS_API_ENCRYPTION_KEY}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - SPARKY_FITNESS_FRONTEND_URL=https://fit.${TAILNET_NAME}.ts.net
      - SPARKY_FITNESS_DISABLE_SIGNUP=false
      - SPARKY_FITNESS_OIDC_AUTH_ENABLED=true
      - SPARKY_FITNESS_OIDC_AUTO_REGISTER=true
      - SPARKY_FITNESS_OIDC_AUTO_REDIRECT=true
      - SPARKY_FITNESS_FORCE_EMAIL_LOGIN=false
      - SPARKY_FITNESS_DISABLE_EMAIL_LOGIN=true
      - SPARKY_FITNESS_OIDC_PROVIDER_NAME=Authentik
      - SPARKY_FITNESS_OIDC_PROVIDER_SLUG=sparky-fitness
      - SPARKY_FITNESS_OIDC_ISSUER_URL=https://auth.${TAILNET_NAME}.ts.net/application/o/sparky-fitness/
      - SPARKY_FITNESS_OIDC_DOMAIN=${TAILNET_NAME}.ts.net
      - SPARKY_FITNESS_OIDC_CLIENT_ID=${SPARKY_FITNESS_OIDC_CLIENT_ID}
      - SPARKY_FITNESS_OIDC_CLIENT_SECRET=${SPARKY_FITNESS_OIDC_CLIENT_SECRET}
      - SPARKY_FITNESS_OIDC_SCOPE=openid email profile
      - GARMIN_MICROSERVICE_URL=http://sparkyfitness-garmin:8000
      - NODE_ENV=production
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - /srv/docker/data/sparkyfitness/backup:/app/SparkyFitnessServer/backup:Z
      - /srv/docker/data/sparkyfitness/uploads:/app/SparkyFitnessServer/uploads:Z
    networks:
      - sparkyfitness-network
    depends_on:
      sparkyfitness-db:
        condition: service_started
    init: true
    labels:
      glance.parent: sparkyfitness
      glance.name: Server

  sparkyfitness-frontend:
    image: codewithcj/sparkyfitness:latest
    restart: unless-stopped
    container_name: sparkyfitness-frontend
    ports:
      - "3004:80"
    env_file:
      - .env
    environment:
      - SPARKY_FITNESS_FRONTEND_URL=https://fit.${TAILNET_NAME}.ts.net
      - SPARKY_FITNESS_SERVER_HOST=sparkyfitness-server
      - SPARKY_FITNESS_SERVER_PORT=3010
    networks:
      - sparkyfitness-network
    depends_on:
      sparkyfitness-server:
        condition: service_started
    labels:
      glance.name: SparkyFitness
      glance.icon: /assets/sparkyfitness.png
      glance.url: https://fit.${TAILNET_NAME}.ts.net
      glance.description: Self-hosted fitness tracker
      glance.id: sparkyfitness
      glance.category: user-facing

  tailscale:
    image: tailscale/tailscale:latest
    command:
      - /usr/local/bin/containerboot
    container_name: sparkyfitness-ts
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=true
    hostname: fit
    volumes:
      - tailscale_state:/var/lib/tailscale:z
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - sparkyfitness-network
    labels:
      glance.name: Tailscale
      glance.parent: sparkyfitness

networks:
  sparkyfitness-network:
    name: sparkyfitness_default

volumes:
  tailscale_state:
